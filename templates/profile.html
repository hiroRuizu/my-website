{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width:600px;">
    <div class="card">
        <h2>My Profile</h2>
        <form method="POST" action="/profile">
            <div class="form-group" style="margin-top:24px;">
                <label>Full name</label>
                <input type="text" name="name" value="{{ current_user.name }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="text" value="{{ current_user.email }}" disabled style="background:#f4f4f4;">
            </div>
            <button type="submit" class="btn">Save changes</button>
        </form>
        <a href="/dashboard" style="display:block;margin-top:16px;color:#555;">Back to dashboard</a>
    </div>
</div>
{% endblock %}
